# ============================================================================
# ПРИМЕРЫ И СЦЕНАРИИ ИСПОЛЬЗОВАНИЯ
# ============================================================================

# Сценарий 1: Полная оценка карьеры и разработка стратегии
scenario_full_assessment:
  name: "Полная Оценка и Стратегия Развития"
  description: |
    Комплексный анализ текущего состояния, определение целей и разработка 
    персонального плана развития с участием всех агентов
  
  agents:
    - chief_coach
    - market_analyst
    - skills_coach
    - branding_strategist
    - verification_specialist
  
  process_type: "hierarchical"
  manager: "chief_coach"
  
  steps:
    1: "Главный Коуч собирает информацию о профиле и целях"
    2: "Аналитик Рынка исследует рынок и требования"
    3: "Коуч по Навыкам выявляет пробелы в компетенциях"
    4: "Стратег Бренда разрабатывает план развития персонального бренда"
    5: "Верификатор проверяет согласованность всех рекомендаций"
    6: "Главный Коуч создает финальный план развития"


# Сценарий 2: Оптимизация резюме и применение на вакансию
scenario_job_application:
  name: "Подготовка к Применению на Работу"
  description: |
    Полный цикл подготовки: анализ вакансии, оптимизация резюме, подготовка 
    к интервью, стратегия переговоров
  
  agents:
    - job_hunter
    - resume_expert
    - interview_mentor
    - market_analyst
    - branding_strategist
    - verification_specialist
    - chief_coach
  
  process_type: "hierarchical"
  manager: "chief_coach"
  
  steps:
    1: "Охотник за Вакансиями анализирует требования должности"
    2: "Эксперт по Резюме оптимизирует резюме под требования"
    3: "Аналитик Рынка исследует компанию и уровень зарплат"
    4: "Интервьюер-Ментор подготавливает кандидата к интервью"
    5: "Стратег Бренда готовит материалы для демонстрации"
    6: "Верификатор проверяет все материалы"
    7: "Главный Коуч создает финальную стратегию применения"


# Сценарий 3: Развитие навыков и обучение
scenario_skill_development:
  name: "План Развития Профессиональных Навыков"
  description: |
    Выявление пробелов в навыках, рекомендации по обучению, создание 
    персонального плана обучения
  
  agents:
    - skills_coach
    - market_analyst
    - chief_coach
  
  process_type: "sequential"
  
  steps:
    1: "Коуч по Навыкам анализирует текущие навыки и цели"
    2: "Аналитик Рынка определяет требуемые навыки на рынке"
    3: "Коуч по Навыкам создает план обучения"
    4: "Главный Коуч интегрирует в общую стратегию"


# Сценарий 4: Подготовка к интервью
scenario_interview_prep:
  name: "Интенсивная Подготовка к Интервью"
  description: |
    Полная подготовка к собеседованию: STAR-ответы, поведенческие 
    вопросы, техническая подготовка
  
  agents:
    - interview_mentor
    - market_analyst
    - verification_specialist
  
  process_type: "sequential"
  
  steps:
    1: "Интервьюер-Ментор анализирует требования должности"
    2: "Аналитик Рынка предоставляет информацию о компании"
    3: "Интервьюер-Ментор подготавливает вопросы и ответы"
    4: "Верификатор проверяет ответы на логику и убедительность"


# Сценарий 5: Личный бренд и онлайн-присутствие
scenario_personal_branding:
  name: "Развитие Персонального Бренда"
  description: |
    Стратегия персонального брендирования, оптимизация LinkedIn, 
    создание портфолио, развитие онлайн-присутствия
  
  agents:
    - branding_strategist
    - market_analyst
    - verification_specialist
  
  process_type: "sequential"
  
  steps:
    1: "Стратег Бренда анализирует текущее состояние"
    2: "Аналитик Рынка определяет целевую аудиторию"
    3: "Стратег Бренда создает план развития"
    4: "Верификатор проверяет согласованность материалов"


# ============================================================================
# ПАРАМЕТРЫ КОНФИГУРАЦИИ
# ============================================================================

# Модели LLM (порядок приоритета)
llm_models:
  - "gpt-4"                    # Лучший результат, дороже
  - "gpt-4-turbo"              # Хороший баланс
  - "gpt-3.5-turbo"            # Быстро, экономно
  - "claude-3-opus"            # Альтернатива
  - "claude-3-sonnet"          # Быстрее, экономнее

# Параметры процесса
process_config:
  verbose: true                 # Подробный вывод
  max_iterations: 10            # Максимум итераций на агента
  temperature: 0.7              # Креативность (0-1)
  top_p: 0.9                    # Разнообразие
  timeout: 300                  # Таймаут в секундах

# Конфигурация инструментов
tools_config:
  use_web_search: true         # Веб-поиск для актуальной информации
  use_api_tools: true          # API для поиска вакансий
  use_file_operations: true    # Работа с файлами
  use_email_tools: true        # Для отправки материалов

# Качество и валидация
quality_config:
  verify_all_output: true      # Проверка всех результатов
  min_confidence: 0.8          # Минимальная уверенность
  check_consistency: true      # Проверка согласованности
  verify_sources: true         # Верификация источников
